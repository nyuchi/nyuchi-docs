name = "nyuchi-docs"
compatibility_date = "2026-03-27"
account_id = "125a2dfbc21f76a25c980609609e8218"

# Pure static site served via Workers Static Assets. No worker entry — the
# Cloudflare-managed asset router serves files from ./dist directly. SPA-style
# fallback is off: Pagefind URLs must resolve to real files, and missing routes
# should land on the Astro-built 404 page.
[assets]
directory = "./dist"
not_found_handling = "404-page"

[observability]
enabled = true
