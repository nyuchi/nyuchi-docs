name = "shamwari-docs-ai"
main = "src/worker.ts"
compatibility_date = "2026-03-27"
compatibility_flags = ["nodejs_compat"]
account_id = "125a2dfbc21f76a25c980609609e8218"

[vars]
TOP_K = "5"
ALLOWED_ORIGINS = "https://docs.nyuchi.com,https://docs.bundu.org"

# One AI Search instance binding per docs corpus. The Cloudflare AI Search
# instances do the crawl, chunk, embed, retrieve, and generate; this worker
# is a thin proxy that adds CORS, per-corpus routing, and the SSE wire shape
# the docs site already consumes.
[[ai_search]]
binding = "NYUCHI_DOCS"
instance_name = "nyuchi-docs"

# bundu-docs is gated on docs.bundu.org publishing a sitemap; uncomment once
# the bundu-docs AI Search instance exists.
# [[ai_search]]
# binding = "BUNDU_DOCS"
# instance_name = "bundu-docs"

[observability]
enabled = true

# Serve the MCP endpoint on the docs domain itself. A path route takes
# precedence over the site worker's custom domain for /mcp* only; the
# worker also stays reachable at shamwari-docs-ai.nyuchi.workers.dev/mcp.
routes = [
  { pattern = "docs.nyuchi.com/mcp*", zone_name = "nyuchi.com" }
]

# MCP write tools: submit_feedback + queued raise_issue land here.
# Set the optional GITHUB_TOKEN secret (wrangler secret put GITHUB_TOKEN)
# to have raise_issue file real GitHub issues on nyuchi/nyuchi-docs.
[[kv_namespaces]]
binding = "FEEDBACK"
id = "9c5af0b28d5c4706840c492b2e3f47e8"
