name = "shamwari-docs-ai"
main = "src/worker.ts"
compatibility_date = "2024-11-27"
compatibility_flags = ["nodejs_compat"]
account_id = "125a2dfbc21f76a25c980609609e8218"

[vars]
# Default chat model. Override with `wrangler secret put` or in dashboard vars.
CHAT_MODEL = "@cf/meta/llama-3.1-70b-instruct"
EMBED_MODEL = "@cf/baai/bge-base-en-v1.5"
AI_GATEWAY_ID = "shamwari-docs"
TOP_K = "5"
ALLOWED_ORIGINS = "https://docs.nyuchi.com,https://docs.bundu.org"

[ai]
binding = "AI"

[[vectorize]]
binding = "VECTORIZE"
index_name = "shamwari-docs"

[observability]
enabled = true
