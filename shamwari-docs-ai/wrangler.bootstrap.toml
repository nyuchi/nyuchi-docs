# Bootstrap config: deploys the worker WITHOUT Vectorize/AI bindings, so that
# the worker URL exists for the docs site to point at while the Vectorize
# index + AI Gateway are provisioned out of band by a privileged operator.
#
# Once those bindings exist (see ../README.md), deploy with the canonical
# wrangler.toml instead.
name = "shamwari-docs-ai"
main = "src/worker.ts"
compatibility_date = "2024-11-27"
compatibility_flags = ["nodejs_compat"]
account_id = "125a2dfbc21f76a25c980609609e8218"

[vars]
CHAT_MODEL = "@cf/meta/llama-3.1-70b-instruct"
EMBED_MODEL = "@cf/baai/bge-base-en-v1.5"
AI_GATEWAY_ID = ""
TOP_K = "5"
ALLOWED_ORIGINS = "https://docs.nyuchi.com,https://docs.bundu.org"

[observability]
enabled = true
