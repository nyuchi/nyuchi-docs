name: deploy-site

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "nyuchi-docs-search/**"
      - ".github/workflows/deploy-site.yml"
  workflow_dispatch:

concurrency:
  group: deploy-site
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile=false
      # nyuchi-docs-search must build first — site imports its compiled
      # `./plugin` and component entrypoints from dist/.
      - run: pnpm --filter nyuchi-docs-search build
      - name: Build site
        env:
          PUBLIC_SHAMWARI_AI_URL: https://shamwari-docs-ai.nyuchi.workers.dev
        run: pnpm --filter site build
      - name: Deploy to Cloudflare
        working-directory: site
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 125a2dfbc21f76a25c980609609e8218
        run: pnpm exec wrangler deploy
