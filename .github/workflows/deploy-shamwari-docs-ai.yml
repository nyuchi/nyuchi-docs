name: deploy-shamwari-docs-ai

on:
  push:
    branches: [main]
    paths:
      - 'shamwari-docs-ai/**'
      - '.github/workflows/deploy-shamwari-docs-ai.yml'
  workflow_dispatch:

concurrency:
  group: deploy-shamwari-docs-ai
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm --filter shamwari-docs-ai test
      - run: pnpm --filter shamwari-docs-ai build
      - name: Deploy to Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 125a2dfbc21f76a25c980609609e8218
        run: pnpm --filter shamwari-docs-ai exec wrangler deploy
