name: build

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile=false
      # Fail the build on any critical/high advisory. Residual moderate
      # (js-yaml >=4.2.0 drops its ESM default export, breaking the Astro
      # build) and dev-only lows (wrangler's esbuild) are tracked, not
      # blocking. Tighten to `moderate` once js-yaml ships an ESM-safe fix.
      - run: pnpm audit --audit-level=high
      - run: pnpm -r build
      - run: pnpm -r --if-present run test
