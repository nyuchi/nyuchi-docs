# Publishes the docs MCP server: nyuchi-docs-mcp to npm, then the
# server record (server.json) to the official MCP registry
# (registry.modelcontextprotocol.io) using GitHub OIDC — no registry
# credentials needed for the io.github.nyuchi/* namespace.
#
# One-time setup: add the NPM_TOKEN repo secret (npm automation token
# with publish rights on `nyuchi-docs-mcp`). Keep the versions in
# nyuchi-docs-mcp/package.json and server.json in lockstep — this
# workflow refuses to publish if they drift.
#
# Trigger: publish a GitHub release (tag e.g. mcp-v0.1.0), or run
# manually via workflow_dispatch.
name: Publish MCP

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # OIDC for mcp-publisher

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Check versions are in lockstep
        run: |
          PKG=$(node -p "require('./nyuchi-docs-mcp/package.json').version")
          SRV=$(node -p "require('./server.json').version")
          SRVPKG=$(node -p "require('./server.json').packages[0].version")
          echo "package=$PKG server.json=$SRV server.json.packages[0]=$SRVPKG"
          test "$PKG" = "$SRV" && test "$PKG" = "$SRVPKG"

      - name: Install + test
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter @nyuchi/nyuchi-docs-mcp test

      - name: Publish to npm
        working-directory: nyuchi-docs-mcp
        # Skip when this version is already on the registry so a re-run
        # (e.g. after a failed MCP-registry step) doesn't die on the
        # npm EPUBLISHCONFLICT before reaching the registry publish.
        run: |
          PKG=$(node -p "require('./package.json').name")
          VER=$(node -p "require('./package.json').version")
          if npm view "$PKG@$VER" version >/dev/null 2>&1; then
            echo "$PKG@$VER already published — skipping npm publish"
          else
            npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Install mcp-publisher
        # Resolve the release asset via the API instead of guessing the
        # filename — the naming (x86_64 vs amd64) has drifted between
        # releases, and a 404 piped straight into tar fails with the
        # misleading "gzip: stdin: not in gzip format".
        run: |
          set -euo pipefail
          url=$(curl -sSf -H "Authorization: Bearer ${{ github.token }}" \
            https://api.github.com/repos/modelcontextprotocol/registry/releases/latest \
            | jq -r '.assets[] | select(.name | test("^mcp-publisher_.*linux_(x86_64|amd64)\\.tar\\.gz$")) | .browser_download_url' \
            | head -n1)
          test -n "$url" || { echo "no linux mcp-publisher asset found in latest release"; exit 1; }
          echo "downloading $url"
          curl -sSfL "$url" -o mcp-publisher.tar.gz
          tar xzf mcp-publisher.tar.gz mcp-publisher
          ./mcp-publisher --version

      - name: Publish to the MCP registry
        run: |
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish
