# Dependabot — weekly grouped dependency PRs for the pnpm workspace.
# Security updates are enabled by default (GitHub raises them regardless);
# this adds scheduled version maintenance so advisories don't pile up
# between manual audit sweeps. Majors are grouped separately so they wait
# for review (Astro 6 → 7 and vitest majors are deliberate, not automatic).
version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 10
    groups:
      minor-and-patch:
        update-types:
          - 'minor'
          - 'patch'
      majors:
        update-types:
          - 'major'
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
